name: Build 9B bloodie SO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c # Version recomendada para estabilidad

    - name: Compile SO with ndk-build
      run: |
        # Navegamos al directorio JNI
        cd app/src/3/main/jni
        # Ejecutamos ndk-build (está en el PATH gracias a nttld/setup-ndk)
        ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_ABI=arm64-v8a

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 9B_bloodie_SO
        path: app/src/3/main/libs/arm64-v8a/libanogs.so
